[build]
  base = "packages/dashboard"
  command = "npm install && npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/planner/*"
  to = "/planner/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
